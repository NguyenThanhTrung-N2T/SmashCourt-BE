version: "3.9"

services:
  smashcourt-be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smashcourt-be
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: smashcourt-ngrok
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http smashcourt-be:8080
    depends_on:
      - smashcourt-be
    restart: unless-stopped
